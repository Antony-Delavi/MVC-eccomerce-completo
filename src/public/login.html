<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>TechStore - Acesso</title>
    
    <meta http-equiv="Content-Security-Policy" 
          content="default-src 'self'; 
                   script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com; 
                   style-src 'self' 'unsafe-inline'; 
                   connect-src 'self';">
</head>

<body class="bg-slate-900 h-screen flex items-center justify-center p-4">
    <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-md transform transition-all">
        
        <div class="text-center mb-8">
            <h1 onclick="window.location.href='home.html'" 
                class="text-2xl font-black text-blue-600 tracking-tighter mb-2 cursor-pointer">TECHSTORE</h1>
            <h2 id="title" class="text-xl font-bold text-slate-800">Login</h2>
            <p id="subtitle" class="text-gray-400 text-sm">Entre com suas credenciais</p>
        </div>

        <form id="authForm" class="space-y-4">
            <div id="nameGroup" class="hidden animate-fadeIn">
                <label class="block text-xs font-black text-gray-400 uppercase tracking-widest mb-1 ml-1">Nome Completo</label>
                <input type="text" id="name" 
                       class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition">
            </div>
            
            <div>
                <label class="block text-xs font-black text-gray-400 uppercase tracking-widest mb-1 ml-1">E-mail *</label>
                <input type="email" id="email" required
                       class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition">
            </div>

            <div>
                <label class="block text-xs font-black text-gray-400 uppercase tracking-widest mb-1 ml-1">Senha *</label>
                <input type="password" id="password" required minlength="6"
                       class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition">
            </div>

            <button type="submit" id="btnSubmit"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-4 rounded-xl transition shadow-lg shadow-blue-200 active:scale-95">
                ENTRAR
            </button>
        </form>

        <p class="text-center mt-8 text-gray-500 text-sm">
            <span id="toggleText">Ainda não tem conta?</span>
            <button onclick="toggleMode()" class="text-blue-600 font-bold hover:underline ml-1">Criar conta agora</button>
        </p>
    </div>

    <script>
        let isLogin = true;

        // Função auxiliar para limpar formulário
        function resetForm() {
            document.getElementById('authForm').reset();
        }

        function toggleMode() {
            isLogin = !isLogin;
            const btn = document.getElementById('btnSubmit');
            
            document.getElementById('title').innerText = isLogin ? 'Login' : 'Cadastro';
            document.getElementById('subtitle').innerText = isLogin 
                ? 'Entre com suas credenciais' 
                : 'Crie sua conta gratuita';
            
            document.getElementById('nameGroup').classList.toggle('hidden', isLogin);
            document.getElementById('toggleText').innerText = isLogin 
                ? 'Ainda não tem conta?' 
                : 'Já tem conta?';
            
            btn.innerText = isLogin ? 'ENTRAR' : 'CADASTRAR AGORA';
            
            resetForm(); // Limpa os campos ao alternar modo
        }

        document.getElementById('authForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSubmit');

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const name = document.getElementById('name').value.trim();

            // Validação básica no frontend
            if (!email || !password) {
                alert('Por favor, preencha e-mail e senha.');
                return;
            }

            if (!isLogin && !name) {
                alert('Por favor, informe seu nome completo.');
                return;
            }

            if (password.length < 6) {
                alert('A senha deve ter pelo menos 6 caracteres.');
                return;
            }

            const data = isLogin ? { email, password } : { name, email, password };
            const route = isLogin ? '/api/login' : '/api/register';

            // Feedback visual
            btn.disabled = true;
            btn.innerText = "PROCESSANDO...";

            try {
                const res = await fetch(route, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await res.json();

                if (res.ok) {
                    if (isLogin) {
                        // Salva informações do usuário
                        localStorage.setItem('token', result.token);
                        localStorage.setItem('userName', result.user.name);
                        localStorage.setItem('userRole', result.user.role);

                        // Redirecionamento inteligente baseado no role
                        if (result.user.role === 'admin') {
                            window.location.href = 'admin.html';
                        } else {
                            window.location.href = 'home.html';
                        }
                    } else {
                        alert('✅ Conta criada com sucesso!\n\nAgora você pode fazer login.');
                        toggleMode(); // Volta para modo login
                    }
                } else {
                    alert('❌ ' + (result.error || 'Erro na autenticação'));
                }
            } catch (err) {
                console.error(err);
                alert('Erro de conexão com o servidor. Verifique sua internet.');
            } finally {
                btn.disabled = false;
                btn.innerText = isLogin ? 'ENTRAR' : 'CADASTRAR AGORA';
            }
        };

        // Inicialização
        // Opcional: se já estiver logado, redireciona automaticamente
        const existingToken = localStorage.getItem('token');
        if (existingToken) {
            const role = localStorage.getItem('userRole');
            if (role === 'admin') {
                window.location.href = 'admin.html';
            } else {
                window.location.href = 'home.html';
            }
        }
    </script>
</body>
</html>
