<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>TechStore - Vitrine</title>
    
    <meta http-equiv="Content-Security-Policy" 
          content="default-src 'self'; 
                   script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com; 
                   style-src 'self' 'unsafe-inline'; 
                   img-src 'self' data: https:; 
                   connect-src 'self';">
    
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>

<body class="bg-gray-50">
    <nav class="bg-white shadow-sm p-4 sticky top-0 z-20 border-b border-gray-100">
        <div class="container mx-auto flex justify-between items-center">
            <h1 onclick="window.location.href='home.html'" 
                class="text-2xl font-black text-blue-600 tracking-tighter cursor-pointer">TECHSTORE</h1>

            <div class="flex items-center gap-6">
                <a href="cart.html" class="relative group p-2 bg-gray-50 rounded-full hover:bg-blue-50 transition">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-slate-700 group-hover:text-blue-600"
                        fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" />
                    </svg>
                    <span id="cartCounter"
                        class="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full border-2 border-white">0</span>
                </a>

                <div id="authControls" class="flex items-center gap-4 border-l pl-6"></div>
            </div>
        </div>
    </nav>

    <main class="container mx-auto py-10 px-4">
        <div class="mb-8">
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-3xl font-bold text-slate-800">Nossos Produtos</h2>
                <span id="productCount" class="bg-blue-100 text-blue-600 px-3 py-1 rounded-full text-sm font-bold">0 itens</span>
            </div>

            <div class="flex gap-3 overflow-x-auto no-scrollbar pb-2" id="categoryList">
                <button onclick="filterByCategory('Todos')" 
                    class="cat-btn active bg-blue-600 text-white px-6 py-2 rounded-full font-bold shadow-md transition whitespace-nowrap">Todos</button>
                <button onclick="filterByCategory('Eletrônicos')" 
                    class="cat-btn bg-white text-slate-600 px-6 py-2 rounded-full font-bold shadow-sm border border-gray-200 hover:bg-gray-50 transition whitespace-nowrap">Eletrônicos</button>
                <button onclick="filterByCategory('Acessórios')" 
                    class="cat-btn bg-white text-slate-600 px-6 py-2 rounded-full font-bold shadow-sm border border-gray-200 hover:bg-gray-50 transition whitespace-nowrap">Acessórios</button>
                <button onclick="filterByCategory('Periféricos')" 
                    class="cat-btn bg-white text-slate-600 px-6 py-2 rounded-full font-bold shadow-sm border border-gray-200 hover:bg-gray-50 transition whitespace-nowrap">Periféricos</button>
                <button onclick="filterByCategory('Hardware')" 
                    class="cat-btn bg-white text-slate-600 px-6 py-2 rounded-full font-bold shadow-sm border border-gray-200 hover:bg-gray-50 transition whitespace-nowrap">Hardware</button>
            </div>
        </div>

        <div id="grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
            <div class="animate-pulse bg-gray-200 h-80 rounded-2xl"></div>
            <div class="animate-pulse bg-gray-200 h-80 rounded-2xl"></div>
            <div class="animate-pulse bg-gray-200 h-80 rounded-2xl"></div>
            <div class="animate-pulse bg-gray-200 h-80 rounded-2xl"></div>
        </div>
    </main>

    <script>
        let cart = JSON.parse(localStorage.getItem('cart')) || [];
        let currentCategory = 'Todos';

        // Função de escape contra XSS
        function escapeHtml(unsafe) {
            if (!unsafe) return '';
            return unsafe
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        // ================== FILTROS ==================
        function filterByCategory(category) {
            currentCategory = category;

            document.querySelectorAll('.cat-btn').forEach(btn => {
                if (btn.innerText === category) {
                    btn.classList.add('bg-blue-600', 'text-white', 'shadow-md');
                    btn.classList.remove('bg-white', 'text-slate-600', 'shadow-sm');
                } else {
                    btn.classList.remove('bg-blue-600', 'text-white', 'shadow-md');
                    btn.classList.add('bg-white', 'text-slate-600', 'shadow-sm');
                }
            });

            load(category);
        }

        // ================== CARRINHO ==================
        function addToCart(id, name, price, image_url) {
            const existingItem = cart.find(item => item.id === id);
            if (existingItem) {
                existingItem.quantity += 1;
            } else {
                cart.push({ id, name, price, image_url, quantity: 1 });
            }
            localStorage.setItem('cart', JSON.stringify(cart));
            updateCartUI();
            alert(`✅ ${name} adicionado ao carrinho!`);
        }

        function updateCartUI() {
            const totalItems = cart.reduce((total, item) => total + (item.quantity || 0), 0);
            document.getElementById('cartCounter').innerText = totalItems;
        }

        // ================== AUTH ==================
        function updateNavbar() {
            const token = localStorage.getItem('token');
            const userName = localStorage.getItem('userName');
            const userRole = localStorage.getItem('userRole');
            const authControls = document.getElementById('authControls');

            if (token && token !== "undefined") {
                const firstName = userName ? userName.split(' ')[0] : 'Usuário';

                let accountButton = '';

                if (userRole === 'admin') {
                    accountButton = `
                        <a href="admin.html" class="text-xs bg-slate-800 text-white px-4 py-2 rounded-full hover:bg-slate-700 transition font-bold shadow-md flex items-center gap-2">
                            <span>⚙️</span> Painel Admin
                        </a>`;
                } else {
                    accountButton = `
                        <a href="my-account.html" class="text-xs bg-emerald-600 text-white px-4 py-2 rounded-full hover:bg-emerald-700 transition font-bold shadow-md flex items-center gap-2">
                            <span>👤</span> Minha Conta
                        </a>`;
                }

                authControls.innerHTML = `
                    <span class="text-slate-600 font-medium hidden md:block text-sm">Olá, <strong class="text-blue-600">${escapeHtml(firstName)}</strong></span>
                    ${accountButton}
                    <button onclick="logout()" class="text-red-400 hover:text-red-600 text-xs font-bold transition">Sair</button>
                `;
            } else {
                authControls.innerHTML = `
                    <a href="login.html" class="text-sm bg-blue-600 text-white px-6 py-2 rounded-full hover:bg-blue-700 transition shadow-md font-bold">
                        Entrar
                    </a>
                `;
            }
        }

        function logout() {
            localStorage.clear();
            sessionStorage.clear();
            window.location.href = 'login.html';
        }

        // ================== CARREGAR PRODUTOS ==================
        async function load(category = 'Todos') {
            const grid = document.getElementById('grid');
            
            try {
                const url = category === 'Todos' 
                    ? '/api/products' 
                    : `/api/products?category=${encodeURIComponent(category)}`;

                const res = await fetch(url);
                const products = await res.json();

                document.getElementById('productCount').innerText = `${products.length} itens`;

                if (products.length === 0) {
                    grid.innerHTML = `
                        <div class="col-span-full text-center py-20">
                            <p class="text-gray-400 text-xl font-medium">Nenhum produto em "${escapeHtml(category)}". 📦</p>
                            <button onclick="filterByCategory('Todos')" class="text-blue-600 mt-2 font-bold underline">Ver todos</button>
                        </div>`;
                    return;
                }

                grid.innerHTML = products.map(p => `
                    <div class="bg-white rounded-2xl p-4 shadow-sm hover:shadow-xl transition-all border border-gray-100 group flex flex-col h-full">
                        <div class="overflow-hidden rounded-xl mb-4 bg-gray-50 h-48">
                            <img src="${escapeHtml(p.image_url || 'https://via.placeholder.com/300')}" 
                                 alt="${escapeHtml(p.name)}"
                                 class="w-full h-full object-cover group-hover:scale-110 transition duration-500"
                                 onerror="this.src='https://via.placeholder.com/300?text=Sem+Imagem'">
                        </div>
                        
                        <span class="text-[10px] font-black text-blue-500 uppercase tracking-widest">${escapeHtml(p.category || 'Geral')}</span>
                        <h3 class="text-lg font-bold text-slate-800 mb-2 truncate">${escapeHtml(p.name)}</h3>
                        
                        <div class="mt-auto pt-4 flex justify-between items-center border-t border-gray-50">
                            <div class="flex flex-col">
                                <span class="text-xs text-gray-400 font-bold uppercase tracking-tighter">Preço</span>
                                <span class="text-xl font-black text-slate-900">R$ ${Number(p.price).toFixed(2)}</span>
                            </div>
                            <button onclick="addToCart(${p.id}, '${escapeHtml(p.name).replace(/'/g, "\\'")}', ${p.price}, '${escapeHtml(p.image_url || '')}')" 
                                    class="bg-blue-600 text-white p-3 rounded-xl hover:bg-blue-700 transition shadow-lg shadow-blue-100 active:scale-95">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                                </svg>
                            </button>
                        </div>
                    </div>
                `).join('');

            } catch (err) {
                console.error("Erro ao carregar produtos:", err);
                grid.innerHTML = `<p class="text-red-500 text-center col-span-full font-bold">Erro ao conectar com o servidor.</p>`;
            }
        }

        // ================== INICIALIZAÇÃO ==================
        updateNavbar();
        updateCartUI();
        load();                    // Carrega todos os produtos inicialmente
    </script>
</body>
</html>
