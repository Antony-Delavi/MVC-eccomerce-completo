<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Minha Conta - TechStore</title>
    
    <meta http-equiv="Content-Security-Policy" 
          content="default-src 'self'; 
                   script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com; 
                   style-src 'self' 'unsafe-inline'; 
                   img-src 'self' data: https:; 
                   connect-src 'self';">
</head>
<body class="bg-slate-50 min-h-screen">
    <nav class="bg-white p-4 shadow-sm border-b border-slate-100">
        <div class="container mx-auto flex justify-between items-center">
            <h1 onclick="window.location.href='home.html'" 
                class="text-2xl font-black text-blue-600 tracking-tighter cursor-pointer">TECHSTORE</h1>
            <a href="home.html" class="text-slate-500 hover:text-blue-600 text-sm font-bold transition">← Voltar para a Loja</a>
        </div>
    </nav>

    <main class="container mx-auto py-10 px-4 max-w-4xl">
        <div class="flex items-center gap-4 mb-8">
            <div class="w-16 h-16 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center text-2xl font-black shadow-inner" id="userInitial">
                👤
            </div>
            <div>
                <h2 class="text-3xl font-black text-slate-800" id="profileName">Minha Conta</h2>
                <p class="text-slate-500 text-sm font-medium" id="profileRole">Cliente</p>
            </div>
        </div>

        <div class="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden">
            <div class="p-6 border-b border-slate-100 bg-slate-50/50">
                <h3 class="text-lg font-black text-slate-800 flex items-center gap-2">
                    <span>📦</span> Histórico de Pedidos
                </h3>
            </div>
            
            <div id="myOrdersList" class="divide-y divide-slate-100">
                <p class="text-center p-12 text-slate-400">Carregando seus pedidos...</p>
            </div>
        </div>
    </main>

    <script>
        const token = localStorage.getItem('token');
        const userRole = localStorage.getItem('userRole');

        if (!token) {
            alert('Você precisa estar logado para acessar esta página.');
            window.location.href = 'login.html';
        }

        function escapeHtml(unsafe) {
            if (!unsafe) return '';
            return unsafe
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        function loadUserInfo() {
            const userName = localStorage.getItem('userName') || 'Usuário';
            const role = userRole || 'customer';

            document.getElementById('profileName').innerText = escapeHtml(userName);
            document.getElementById('userInitial').innerText = userName.charAt(0).toUpperCase();
            
            const roleText = role === 'admin' ? 'Administrador' : 'Cliente';
            document.getElementById('profileRole').innerText = roleText;
        }

        async function loadMyOrders() {
            const list = document.getElementById('myOrdersList');
            list.innerHTML = `<p class="text-center p-12 text-slate-400">Carregando seus pedidos...</p>`;

            try {
                const res = await fetch('/api/my-orders', {
                    headers: { 
                        'Authorization': `Bearer ${token}` 
                    }
                });

                if (!res.ok) {
                    if (res.status === 401) {
                        throw new Error("Sessão expirada. Faça login novamente.");
                    }
                    throw new Error("Erro ao buscar pedidos");
                }

                const orders = await res.json();

                if (orders.length === 0) {
                    list.innerHTML = `
                        <div class="text-center p-12">
                            <span class="text-4xl block mb-4 opacity-50">🛍️</span>
                            <p class="text-slate-500 font-medium">Você ainda não fez nenhuma compra.</p>
                            <button onclick="window.location.href='home.html'" 
                                    class="mt-4 text-blue-600 font-bold hover:underline">Ir às compras</button>
                        </div>`;
                    return;
                }

                let html = '';
                orders.forEach(order => {
                    const items = JSON.parse(order.items || '[]');
                    const date = new Date(order.createdAt).toLocaleDateString('pt-BR');
                    
                    html += `
                        <div class="p-6 hover:bg-slate-50 transition">
                            <div class="flex justify-between items-center mb-4">
                                <div>
                                    <span class="text-[10px] font-black uppercase tracking-widest text-slate-400">Pedido #${order.id}</span>
                                    <p class="text-sm font-bold text-slate-700">Realizado em ${date}</p>
                                </div>
                                <span class="bg-emerald-100 text-emerald-700 px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-widest border border-emerald-200">
                                    ${escapeHtml(order.status || 'Concluído')}
                                </span>
                            </div>
                            
                            <div class="bg-white border border-slate-100 rounded-xl p-4 space-y-2 mb-4">`;
                    
                    items.forEach(item => {
                        html += `
                            <div class="flex justify-between text-sm">
                                <span class="text-slate-600">
                                    <span class="font-bold text-blue-600">${item.quantity}x</span> ${escapeHtml(item.name)}
                                </span>
                                <span class="font-bold text-slate-800">R$ ${(item.price * item.quantity).toFixed(2)}</span>
                            </div>`;
                    });

                    html += `</div>
                            
                            <div class="flex justify-between items-center border-t border-slate-100 pt-4">
                                <span class="font-bold text-slate-500 text-sm">Total do Pedido:</span>
                                <span class="font-black text-xl text-blue-600">R$ ${Number(order.total).toFixed(2)}</span>
                            </div>
                        </div>`;
                });

                list.innerHTML = html;

            } catch (err) {
                console.error(err);
                let message = "Não foi possível carregar seu histórico.";
                
                if (err.message.includes("Sessão expirada")) {
                    message = "Sua sessão expirou. Redirecionando para o login...";
                    setTimeout(() => {
                        localStorage.clear();
                        window.location.href = 'login.html';
                    }, 2000);
                }
                
                list.innerHTML = `<p class="text-red-500 text-center p-8">${message} Tente novamente mais tarde.</p>`;
            }
        }

        loadUserInfo();
        loadMyOrders();
    </script>
</body>
</html>
